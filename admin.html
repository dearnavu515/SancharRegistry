<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSNL - Database </title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            padding: 2rem;
            background: #f4f7f6;
        }

        .admin-container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 100%;
            overflow-x: auto;
        }

        h1 {
            color: #0056b3;
            margin-bottom: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            min-width: 1200px;
        }

        th,
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background-color: #0056b3;
            color: white;
            font-weight: 600;
            white-space: nowrap;
        }

        tr:hover {
            background-color: #f1f5f9;
        }

        .status {
            padding: 10px;
            background: #e8f0fe;
            color: #0056b3;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 15px;
        }

        .error {
            background: #fee2e2;
            color: #b91c1c;
        }

        .delete-btn {
            background-color: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fca5a5;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background-color: #fca5a5;
            color: white;
        }
        .btn-export {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            font-size: 0.9rem;
            font-family: inherit;
        }
        .btn-export:hover {
            background-color: #059669;
        }
        .sig-preview {
            max-height: 35px;
            max-width: 90px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: white;
            transition: transform 0.2s;
        }
        .sig-preview:hover {
            transform: scale(3.5);
            position: relative;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.25);
        }
    </style>
</head>

<body>
    <div class="admin-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h1 style="margin: 0; color: #0056b3;">BSNL Employee Database</h1>
            <button id="exportBtn" class="btn-export" onclick="exportToCSV()" style="display: none;">Export to CSV</button>
        </div>
        <div id="statusMessage" class="status">Loading data from SQLite...</div>

        <table id="dataTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>HR No.</th>
                    <th>Designation</th>
                    <th>DOB</th>
                    <th>Blood</th>
                    <th>PAN</th>
                    <th>Date Issued</th>
                    <th>Mobile</th>
                    <th>Signature</th>
                    <th>Submitted At</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Data will be injected here -->
            </tbody>
        </table>
    </div>

    <script>
        let currentEmployeeData = [];

        async function loadData() {
            const tableBody = document.getElementById('tableBody');
            const statusMessage = document.getElementById('statusMessage');

            tableBody.innerHTML = ''; // Clear table before loading
            document.getElementById('exportBtn').style.display = 'none';

            try {
                const response = await fetch('http://localhost:3000/api/employees');
                if (!response.ok) throw new Error("Server disconnected");

                const data = await response.json();
                currentEmployeeData = data;

                if (data.length === 0) {
                    statusMessage.textContent = "Database is currently empty.";
                    return;
                }

                document.getElementById('exportBtn').style.display = 'block';

                statusMessage.textContent = `Successfully loaded ${data.length} employee records.`;
                statusMessage.style.background = '#dcfce7';
                statusMessage.style.color = '#166534';

                data.forEach(emp => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${emp.id}</td>
                        <td><strong>${emp.name}</strong></td>
                        <td>${emp.hr_number}</td>
                        <td>${emp.designation}</td>
                        <td>${emp.dob}</td>
                        <td>${emp.blood_group}</td>
                        <td>${emp.pan_number}</td>
                        <td>${emp.date_of_issue}</td>
                        <td>${emp.tel_mobile}</td>
                        <td>
                            ${emp.signature_image ? `<img class="sig-preview" src="${emp.signature_image}" alt="Signature">` : '<span style="color:#999; font-style:italic;">No image</span>'}
                        </td>
                        <td>${new Date(emp.created_at + 'Z').toLocaleString()}</td>
                        <td><button class="delete-btn" onclick="deleteEmployee(${emp.id})">Delete</button></td>
                    `;
                    tableBody.appendChild(row);
                });

            } catch (error) {
                console.error(error);
                statusMessage.textContent = "Error connecting to the database server. Make sure `node server.js` is running!";
                statusMessage.classList.add('error');
            }
        }

        window.deleteEmployee = async function (id) {
            if (!confirm("Are you sure you want to delete this employee record?")) return;

            try {
                const response = await fetch(`http://localhost:3000/api/employees/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    loadData(); // Reload the table
                } else {
                    alert("Failed to delete the record.");
                }
            } catch (error) {
                console.error("Error deleting:", error);
                alert("An error occurred while deleting the record.");
            }
        };

        window.exportToCSV = function () {
            if (currentEmployeeData.length === 0) return;

            const headers = ["ID", "Name", "HR Number", "Designation", "Date of Birth", "Blood Group", "PAN Number", "Date of Issue", "Office Address", "Office Tel", "Residence Tel", "Mobile Tel", "Has Signature", "Submitted At"];
            let csvRows = [headers.join(",")];

            currentEmployeeData.forEach(emp => {
                const hasSig = emp.signature_image ? "Yes" : "No";
                const row = [
                    emp.id,
                    `"${emp.name.replace(/"/g, '""')}"`,
                    `="${emp.hr_number}"`,
                    `"${emp.designation.replace(/"/g, '""')}"`,
                    `="${emp.dob}"`,
                    `"${emp.blood_group}"`,
                    `="${emp.pan_number}"`,
                    `="${emp.date_of_issue}"`,
                    `"${emp.office_address.replace(/"/g, '""')}"`,
                    emp.tel_office ? `="${emp.tel_office}"` : '""',
                    emp.tel_residence ? `="${emp.tel_residence}"` : '""',
                    `="${emp.tel_mobile}"`,
                    `"${hasSig}"`,
                    `"${new Date(emp.created_at + 'Z').toLocaleString().replace(/"/g, '""')}"`
                ];
                csvRows.push(row.join(","));
            });

            const csvContent = csvRows.join("\n");
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `BSNL_Employees_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>

</html>
